<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Prazos novo CPC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📅 Calculadora de Prazos</h1>

<p class="info">
  Contagem em dias úteis conforme o Novo CPC (art. 224):
  exclui o dia do início e inclui o dia do vencimento.
</p>

<label>Data inicial</label>
<input type="date" id="dataInicial">

<label>Dias úteis</label>
<input type="number" id="dias" placeholder="Ex: 10">

<button onclick="calcularPrazo()">Calcular prazo</button>

<div id="resultado" class="resultado"></div>

<h3>Histórico</h3>
<ul id="historico"></ul>
<button onclick="limparHistorico()">Limpar histórico</button>

</body>
<script src="feriados.js"></script>
<script src="script.js"></script>
</html>
